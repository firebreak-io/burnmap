name: burnmap
description: Render a tofu/terraform plan as a diagram and post it as a sticky PR comment.
inputs:
  plan-json:
    description: Path to `tofu show -json <plan>` output.
    required: true
  s3-bucket:
    description: S3 bucket for the rendered PNG (private).
    required: true
  github-token:
    description: Token used to post the PR comment (unused when comment: false).
    required: false
    default: ${{ github.token }}
  comment:
    description: "Post a sticky PR comment with the diagram(s). Set false for upload-only (no PR/token needed)."
    required: false
    default: "true"
  aws-region:
    description: AWS region for the S3 client.
    required: false
    default: us-west-2
  url-ttl-seconds:
    description: Presigned URL TTL (seconds). GitHub's Camo proxy caches the image at render time.
    required: false
    default: "86400"
  web-dist:
    description: Override path to the built @burnmap/web dist (defaults to the bundled one).
    required: false
  presign-access-key-id:
    description: >-
      Access key id of a long-lived IAM user (s3:GetObject on the bucket) used
      ONLY to presign the image GET URL. Lets the URL stay valid for the full
      url-ttl-seconds (up to 7 days); without it, presigning uses the caller's
      ambient creds, so a temporary OIDC-role session caps the URL at ~1-12h and
      the image breaks once the session expires. Uploads always use the ambient
      creds. Must be set together with presign-secret-access-key.
    required: false
  presign-secret-access-key:
    description: Secret access key paired with presign-access-key-id.
    required: false
  mode:
    description: "What to render: plan (diff, default) | arch (architecture) | both."
    required: false
    default: plan
outputs:
  image-url:
    description: Presigned URL of the uploaded diagram.
  image-urls:
    description: JSON array of all presigned diagram URLs, in stable (lexicographic) order.
  arch-image-url:
    description: Presigned URL of the uploaded architecture diagram (arch/both mode).
runs:
  using: docker
  image: Dockerfile
